<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Tímaskráning">
<title>Tímaskráning</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #111; color: #f0f0f0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }

#clock { font-size: 58px; font-weight: 200; letter-spacing: -2px; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
#dateline { font-size: 16px; color: #888; margin-bottom: 16px; }

#emp-label { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
#emp-display { font-size: 38px; font-weight: 300; letter-spacing: 8px; min-height: 48px; margin-bottom: 14px; min-width: 200px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 6px; }

.numpad { display: grid; grid-template-columns: repeat(3, 70px); gap: 9px; margin-bottom: 16px; }
.np { width: 70px; height: 70px; border-radius: 50%; background: #222; border: 1px solid #333; font-size: 26px; color: #f0f0f0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
.np:active, .np:hover { background: #333; }

.btn-row { display: flex; gap: 16px; margin-bottom: 10px; }
.btn { width: 160px; height: 56px; border-radius: 16px; border: none; font-size: 18px; font-weight: 600; cursor: pointer; transition: opacity 0.1s, transform 0.1s; }
.btn:active { transform: scale(0.96); opacity: 0.85; }
#btn-in  { background: #00c97a; color: #000; }
#btn-out { background: #333; color: #ff5a5a; border: 1px solid #ff5a5a44; }

#msg { font-size: 14px; color: #888; min-height: 20px; text-align: center; }
#msg.ok  { color: #00c97a; }
#msg.err { color: #ff5a5a; }
#msg.wait { color: #f0a500; }

/* SUCCESS */
#success { display: none; flex-direction: column; align-items: center; justify-content: center; position: fixed; inset: 0; background: #111; }
#success.show { display: flex; }
#s-icon { font-size: 64px; margin-bottom: 16px; }
#s-id   { font-size: 52px; font-weight: 300; }
#s-type { font-size: 14px; color: #888; letter-spacing: 3px; margin-top: 8px; }
#s-time { font-size: 32px; font-weight: 300; margin-top: 12px; }
#s-dur  { font-size: 16px; color: #00c97a; margin-top: 6px; }
#s-bar  { width: 200px; height: 2px; background: #333; border-radius: 2px; margin-top: 24px; overflow: hidden; }
#s-fill { height: 100%; background: #00c97a; width: 0; transition: width 3s linear; }

/* MODAL */
#modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; padding: 24px; }
#modal-bg.show { display: flex; }
.modal { background: #1e1e1e; border-radius: 20px; padding: 24px; width: 100%; max-width: 340px; border: 1px solid #333; }
.modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.modal p  { font-size: 14px; color: #888; margin-bottom: 20px; line-height: 1.5; }
.modal em { color: #f0a500; font-style: normal; }
.mlabel { font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px; }
.minput { width: 100%; background: #111; border: 1px solid #333; border-radius: 10px; color: #f0f0f0; font-size: 18px; padding: 12px; margin-bottom: 16px; }
.minput:focus { outline: none; border-color: #555; }
.mbtns { display: flex; gap: 12px; }
.mskip { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #333; background: transparent; color: #888; font-size: 16px; cursor: pointer; }
.msave { flex: 2; padding: 14px; border-radius: 10px; border: none; background: #ff5a5a; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div id="clock">00:00</div>
<div id="dateline">...</div>

<div id="emp-label">Employee number</div>
<div id="emp-display">_</div>

<div class="numpad">
  <div class="np" onclick="np('1')">1</div>
  <div class="np" onclick="np('2')">2</div>
  <div class="np" onclick="np('3')">3</div>
  <div class="np" onclick="np('4')">4</div>
  <div class="np" onclick="np('5')">5</div>
  <div class="np" onclick="np('6')">6</div>
  <div class="np" onclick="np('7')">7</div>
  <div class="np" onclick="np('8')">8</div>
  <div class="np" onclick="np('9')">9</div>
  <div class="np" style="font-size:14px;color:#888" onclick="np('CLR')">CLR</div>
  <div class="np" onclick="np('0')">0</div>
  <div class="np" style="font-size:18px;color:#888" onclick="np('DEL')">⌫</div>
</div>

<div class="btn-row">
  <button class="btn" id="btn-in"  onclick="punch('IN')">▶ Clock In</button>
  <button class="btn" id="btn-out" onclick="punch('OUT')">Clock Out ◀</button>
</div>

<div id="msg"></div>

<!-- SUCCESS -->
<div id="success">
  <div id="s-icon">✓</div>
  <div id="s-id"></div>
  <div id="s-type"></div>
  <div id="s-time"></div>
  <div id="s-dur"></div>
  <div id="s-bar"><div id="s-fill"></div></div>
</div>

<!-- MODAL -->
<div id="modal-bg">
  <div class="modal">
    <h3>Missed clock-out</h3>
    <p>Employee <em id="m-emp"></em> clocked in on <em id="m-date"></em> at <em id="m-in"></em> but never clocked out.<br><br>When did they finish?</p>
    <label class="mlabel">Date</label>
    <input type="date" class="minput" id="m-d">
    <label class="mlabel">Time</label>
    <input type="time" class="minput" id="m-t">
    <div class="mbtns">
      <button class="mskip" onclick="skipModal()">Skip</button>
      <button class="msave" onclick="saveModal()">Save & clock in</button>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzawg3-_PI_qvCkwVrL8LDrKugy-0M-szTH3f7RqT-44q3uC1cLtKDR2j9BCHemwW7mqw/exec";

const EMPLOYEES = {
  "10": "Alexis", "11": "Adam", "12": "Alvaro",
  "13": "Tabea", "14": "Tekla", "15": "Hubert"
};

const WELCOME = [
  "Vonandi verður vaktin frábær!",
  "Gott að sjá þig!",
  "Gangi þér vel í dag!"
];

function getName(id) { return EMPLOYEES[String(id)] || null; }

let emp = '';
let pendingEmp = null;
let stimer = null;

// CLOCK
function updateClock() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock').textContent = h + ':' + m;
  document.getElementById('dateline').textContent = days[n.getDay()] + ', ' + n.getDate() + ' ' + months[n.getMonth()] + ' ' + n.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

// NUMPAD
function np(v) {
  if (v === 'CLR') emp = '';
  else if (v === 'DEL') emp = emp.slice(0, -1);
  else if (emp.length < 6) emp += v;
  document.getElementById('emp-display').textContent = emp || '_';
  setMsg('');
}

function setMsg(t, c) {
  const el = document.getElementById('msg');
  el.textContent = t;
  el.className = c || '';
}

function nowDate() { return new Date().toISOString().slice(0,10); }
function nowTime() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

// PUNCH
async function punch(type) {
  if (!emp) { setMsg('Enter employee number first.', 'err'); return; }
  const id = emp;
  if (!getName(id)) { setMsg('Starfsmaður finnst ekki.', 'err'); return; }
  setMsg('Checking...', 'wait');
  try {
    const res = await apiPost({ action: 'checkStatus', employeeId: id });
    if (type === 'IN') {
      if (res.status === 'in') { setMsg('Already clocked in today.', 'err'); return; }
      if (res.status === 'missedOut') {
        pendingEmp = id;
        document.getElementById('m-emp').textContent = id;
        document.getElementById('m-date').textContent = res.date;
        document.getElementById('m-in').textContent = res.clockIn;
        document.getElementById('m-d').value = res.date;
        document.getElementById('m-t').value = '17:00';
        document.getElementById('modal-bg').classList.add('show');
        setMsg('');
        return;
      }
      await doIn(id);
    } else {
      if (res.status === 'out') { setMsg('Not clocked in.', 'err'); return; }
      if (res.status === 'missedOut') { setMsg('Fix previous day first — clock in.', 'err'); return; }
      await doOut(id);
    }
  } catch(e) {
    setMsg('Connection error. Try again.', 'err');
  }
}

async function doIn(id) {
  setMsg('Saving...', 'wait');
  const r = await apiPost({ action: 'clockIn', employeeId: id, date: nowDate(), time: nowTime() });
  if (r.success) showSuccess(id, 'IN', nowTime(), '');
  else setMsg(r.error || 'Error', 'err');
}

async function doOut(id) {
  setMsg('Saving...', 'wait');
  const r = await apiPost({ action: 'clockOut', employeeId: id, date: nowDate(), time: nowTime() });
  if (r.success) showSuccess(id, 'OUT', nowTime(), r.duration || '');
  else setMsg(r.error || 'Error', 'err');
}

async function saveModal() {
  const d = document.getElementById('m-d').value;
  const t = document.getElementById('m-t').value;
  if (!d || !t) return;
  document.getElementById('modal-bg').classList.remove('show');
  setMsg('Saving correction...', 'wait');
  await apiPost({ action: 'manualClockOut', employeeId: pendingEmp, date: d, time: t, note: 'manual correction' });
  await doIn(pendingEmp);
}

function skipModal() {
  document.getElementById('modal-bg').classList.remove('show');
  doIn(pendingEmp);
}

function showSuccess(id, type, timeStr, dur) {
  setMsg('');
  emp = '';
  const name = getName(id) || id;
  document.getElementById('emp-display').textContent = '_';
  document.getElementById('s-icon').textContent = '✓';
  document.getElementById('s-icon').style.color = type === 'IN' ? '#00c97a' : '#ff5a5a';
  document.getElementById('s-id').textContent = name;
  if (type === 'IN') {
    document.getElementById('s-type').textContent = 'Velkominn/n, ' + name + '!';
    document.getElementById('s-dur').textContent = WELCOME[Math.floor(Math.random()*WELCOME.length)];
  } else {
    document.getElementById('s-type').textContent = 'Takk fyrir vaktina, ' + name + '!';
    document.getElementById('s-dur').textContent = dur ? 'Vakt: ' + dur : '';
  }
  var _skipDur = true;
  document.getElementById('s-time').textContent = timeStr;
  if (!_skipDur) document.getElementById('s-dur').textContent = dur;
  document.getElementById('success').classList.add('show');
  const fill = document.getElementById('s-fill');
  fill.style.transition = 'none'; fill.style.width = '0';
  setTimeout(() => { fill.style.transition = 'width 3s linear'; fill.style.width = '100%'; }, 50);
  if (stimer) clearTimeout(stimer);
  stimer = setTimeout(() => { document.getElementById('success').classList.remove('show'); }, 3200);
}

async function apiPost(data) {
  const r = await fetch(API, { method: 'POST', body: JSON.stringify(data) });
  return r.json();
}
</script>
</body>
</html>
