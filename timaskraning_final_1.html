<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tímaskráning">
<title>Tímaskráning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1c1c1c;
  --surface2: #262626;
  --border: #2e2e2e;
  --text: #f0f0f0;
  --muted: #666;
  --green: #00c97a;
  --green-bg: #003d25;
  --red: #ff5a5a;
  --red-bg: #3d0000;
  --amber: #f0a500;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

/* SCREENS */
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.screen.active { opacity: 1; pointer-events: all; }

/* TOP BAR */
.topbar { position: fixed; top: 0; left: 0; right: 0; padding: env(safe-area-inset-top, 12px) 1.25rem 0.75rem; display: flex; justify-content: space-between; align-items: flex-end; z-index: 10; }
.tb-time { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.tb-date { font-size: 12px; color: var(--muted); }

/* MAIN */
.big-clock { font-family: var(--mono); font-size: clamp(56px, 14vw, 80px); font-weight: 400; letter-spacing: -2px; line-height: 1; margin-bottom: 1.5rem; }
.divider { width: 32px; height: 1px; background: var(--border); margin-bottom: 1.5rem; }

.emp-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
.emp-display {
  font-family: var(--mono);
  font-size: clamp(40px, 10vw, 56px);
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--text);
  min-width: 180px;
  text-align: center;
  height: 64px;
  line-height: 64px;
  border-bottom: 1.5px solid var(--border);
  margin-bottom: 1.25rem;
  padding: 0 8px;
  transition: border-color 0.2s;
  position: relative;
}
.emp-display.has-val { border-color: #555; }
.cursor { display: inline-block; width: 2px; height: 44px; background: var(--green); vertical-align: middle; margin-left: 2px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* NUMPAD */
.numpad { display: grid; grid-template-columns: repeat(3, 72px); gap: 10px; margin-bottom: 1.25rem; }
.np { width: 72px; height: 72px; border-radius: 50%; background: var(--surface); border: 0.5px solid var(--border); font-family: var(--mono); font-size: 22px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s, transform 0.08s; }
.np:active { background: var(--surface2); transform: scale(0.92); }
.np-sm { font-size: 12px; letter-spacing: 0.04em; color: var(--muted); }

/* BUTTONS */
.action-row { display: flex; gap: 12px; width: 100%; max-width: 340px; }
.act-btn { flex: 1; height: 60px; border-radius: 12px; border: none; font-family: var(--sans); font-size: 15px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; transition: transform 0.1s, opacity 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.act-btn:active { transform: scale(0.96); }
.btn-in  { background: var(--green); color: #000; }
.btn-out { background: var(--surface); color: var(--red); border: 1px solid #3d1010; }
.btn-out:hover { background: var(--red-bg); }

/* FEEDBACK */
.feedback { font-size: 13px; color: var(--muted); margin-top: 0.75rem; min-height: 20px; text-align: center; }
.feedback.ok  { color: var(--green); }
.feedback.err { color: var(--red); }
.feedback.wait { color: var(--amber); }

/* SUCCESS */
#screen-success { gap: 6px; }
.s-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; font-size: 32px; }
.s-in  { background: var(--green-bg); color: var(--green); }
.s-out { background: var(--red-bg); color: var(--red); }
.s-id   { font-family: var(--mono); font-size: 44px; font-weight: 500; }
.s-type { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.s-time { font-family: var(--mono); font-size: 26px; margin-top: 10px; }
.s-dur  { font-size: 14px; color: var(--green); margin-top: 4px; }
.progress { width: 180px; height: 2px; background: var(--border); border-radius: 2px; margin-top: 1.5rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--green); width: 0; transition: width 3s linear; }

/* LOG SCREEN */
#screen-log { justify-content: flex-start; padding-top: calc(env(safe-area-inset-top, 12px) + 56px); overflow-y: auto; align-items: stretch; }
.log-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.log-title { font-size: 17px; font-weight: 500; }
.back-btn { font-size: 13px; color: var(--muted); background: none; border: 0.5px solid var(--border); padding: 6px 14px; border-radius: 6px; cursor: pointer; }
table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: var(--mono); }
th { text-align: left; color: var(--muted); font-weight: 400; padding: 6px 6px; border-bottom: 0.5px solid var(--border); font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase; }
td { padding: 9px 6px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
.tag { padding: 2px 7px; border-radius: 4px; font-size: 11px; }
.tag-in  { background: var(--green-bg); color: var(--green); }
.tag-out { background: #1a1a1a; color: var(--muted); }
.dur-cell { color: var(--green); }
.sheets-link { text-align: center; margin-top: 1.25rem; font-size: 12px; color: var(--muted); }
.sheets-link a { color: var(--muted); text-decoration: underline; }

/* MODAL */
.modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1.5rem; }
.modal-wrap.open { display: flex; }
.modal { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 340px; }
.modal h3 { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
.modal p  { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.55; }
.modal em { color: var(--amber); font-style: normal; font-family: var(--mono); }
.m-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
.m-input { width: 100%; background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 16px; padding: 10px 12px; margin-bottom: 14px; }
.m-input:focus { outline: none; border-color: #555; }
.modal-btns { display: flex; gap: 10px; }
.m-skip    { flex: 1; padding: 12px; border-radius: 8px; border: 0.5px solid var(--border); background: transparent; color: var(--muted); font-size: 14px; cursor: pointer; }
.m-save    { flex: 2; padding: 12px; border-radius: 8px; border: none; background: var(--red); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; }

/* LOG BUTTON */
.log-fab { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 1.25rem); right: 1.25rem; background: var(--surface); border: 0.5px solid var(--border); color: var(--muted); font-size: 12px; padding: 8px 16px; border-radius: 20px; cursor: pointer; z-index: 5; }
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-time" id="tb-time">00:00:00</div>
  <div class="tb-date" id="tb-date"></div>
</div>

<!-- MAIN -->
<div class="screen active" id="screen-main">
  <div class="big-clock" id="big-clock">00:00</div>
  <div class="divider"></div>
  <div class="emp-label">Employee number</div>
  <div class="emp-display" id="emp-display"><span class="cursor"></span></div>
  <div class="numpad">
    <div class="np" onclick="np('1')">1</div>
    <div class="np" onclick="np('2')">2</div>
    <div class="np" onclick="np('3')">3</div>
    <div class="np" onclick="np('4')">4</div>
    <div class="np" onclick="np('5')">5</div>
    <div class="np" onclick="np('6')">6</div>
    <div class="np" onclick="np('7')">7</div>
    <div class="np" onclick="np('8')">8</div>
    <div class="np" onclick="np('9')">9</div>
    <div class="np np-sm" onclick="np('CLR')">CLR</div>
    <div class="np" onclick="np('0')">0</div>
    <div class="np np-sm" onclick="np('DEL')">⌫</div>
  </div>
  <div class="action-row">
    <button class="act-btn btn-in"  onclick="punch('IN')">▶ CLOCK IN</button>
    <button class="act-btn btn-out" onclick="punch('OUT')">CLOCK OUT ▶</button>
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<!-- SUCCESS -->
<div class="screen" id="screen-success">
  <div class="s-circle" id="s-circle">✓</div>
  <div class="s-id"   id="s-id"></div>
  <div class="s-type" id="s-type"></div>
  <div class="s-time" id="s-time"></div>
  <div class="s-dur"  id="s-dur"></div>
  <div class="progress"><div class="progress-fill" id="prog"></div></div>
</div>

<!-- LOG -->
<div class="screen" id="screen-log">
  <div class="log-head">
    <span class="log-title">Punch log</span>
    <button class="back-btn" onclick="show('screen-main')">← Back</button>
  </div>
  <table>
    <thead><tr><th>ID</th><th>Date</th><th>In</th><th>Out</th><th>Duration</th></tr></thead>
    <tbody id="log-body"></tbody>
  </table>
  <div class="sheets-link">
    <a href="https://docs.google.com/spreadsheets/d/1eeNau0bwKhOKj9JDjKqB4rErMVdAqnfFlayUzLDjxaY/edit" target="_blank">Open Google Sheets ↗</a>
  </div>
</div>

<!-- MISSED PUNCH MODAL -->
<div class="modal-wrap" id="modal">
  <div class="modal">
    <h3>Missed clock-out</h3>
    <p>Employee <em id="m-emp"></em> clocked in on <em id="m-prev-date"></em> at <em id="m-prev-in"></em> but never clocked out.<br><br>Enter when they finished before clocking in again:</p>
    <label class="m-label">Date</label>
    <input type="date" class="m-input" id="m-date" />
    <label class="m-label">Time they finished</label>
    <input type="time" class="m-input" id="m-time" />
    <div class="modal-btns">
      <button class="m-skip" onclick="skipMissed()">Skip</button>
      <button class="m-save" onclick="saveMissed()">Save & clock in</button>
    </div>
  </div>
</div>

<button class="log-fab" onclick="openLog()">Log ↗</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoWkGwVA7cCEnShOJM1C63MbEBFi7X0XwEiGtz8fStT6f9ljuv2qOffOx4ljn35IGjJw/exec";

let empVal = '';
let pendingEmp = null;
let successTimer = null;

// ── CLOCK ──
function tick() {
  const now = new Date();
  document.getElementById('big-clock').textContent = now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('tb-time').textContent = now.toLocaleTimeString('en-GB');
  document.getElementById('tb-date').textContent = now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  setTimeout(tick, 1000);
}
window.addEventListener('load', tick);

// ── NUMPAD ──
function np(v) {
  if (v==='CLR') empVal='';
  else if (v==='DEL') empVal=empVal.slice(0,-1);
  else if (empVal.length<6) empVal+=v;
  const el = document.getElementById('emp-display');
  el.innerHTML = empVal ? empVal+'<span class="cursor"></span>' : '<span class="cursor"></span>';
  el.classList.toggle('has-val', empVal.length>0);
  setFb('');
}

function setFb(msg,cls='') {
  const el=document.getElementById('feedback');
  el.textContent=msg; el.className='feedback'+(cls?' '+cls:'');
}

function todayStr() { return new Date().toISOString().slice(0,10); }
function nowTime()  { return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }

// ── PUNCH ──
async function punch(type) {
  if (!empVal) { setFb('Enter employee number first.','err'); return; }
  const id = empVal;
  setFb('Checking status…','wait');

  try {
    const res = await post({ action:'checkStatus', employeeId: id });

    if (type === 'IN') {
      if (res.status === 'in') {
        setFb('Already clocked in today.','err'); return;
      }
      if (res.status === 'missedOut') {
        // Show modal
        pendingEmp = id;
        document.getElementById('m-emp').textContent = id;
        document.getElementById('m-prev-date').textContent = res.date;
        document.getElementById('m-prev-in').textContent = res.clockIn;
        document.getElementById('m-date').value = res.date;
        document.getElementById('m-time').value = '17:00';
        document.getElementById('modal').classList.add('open');
        setFb('');
        return;
      }
      // status === 'out' — normal clock in
      await doClockIn(id);

    } else { // OUT
      if (res.status === 'out') {
        setFb('Not clocked in.','err'); return;
      }
      if (res.status === 'missedOut') {
        setFb('Open punch from previous day — clock in first.','err'); return;
      }
      await doClockOut(id);
    }
  } catch(err) {
    setFb('Connection error. Try again.','err');
  }
}

async function doClockIn(id) {
  setFb('Saving…','wait');
  const r = await post({ action:'clockIn', employeeId:id, date:todayStr(), time:nowTime() });
  if (r.success) showSuccess(id,'IN',nowTime(),'');
  else setFb(r.error||'Error','err');
}

async function doClockOut(id) {
  setFb('Saving…','wait');
  const r = await post({ action:'clockOut', employeeId:id, date:todayStr(), time:nowTime() });
  if (r.success) showSuccess(id,'OUT',nowTime(),r.duration||'');
  else setFb(r.error||'Error','err');
}

// ── MODAL ──
async function saveMissed() {
  const d = document.getElementById('m-date').value;
  const t = document.getElementById('m-time').value;
  if (!d||!t) return;
  document.getElementById('modal').classList.remove('open');
  setFb('Saving correction…','wait');
  await post({ action:'manualClockOut', employeeId:pendingEmp, date:d, time:t, note:'manual correction' });
  await doClockIn(pendingEmp);
}

function skipMissed() {
  document.getElementById('modal').classList.remove('open');
  doClockIn(pendingEmp);
}

// ── SUCCESS ──
function showSuccess(id,type,timeStr,dur) {
  setFb(''); empVal='';
  document.getElementById('emp-display').innerHTML='<span class="cursor"></span>';

  const circle = document.getElementById('s-circle');
  circle.className = 's-circle '+(type==='IN'?'s-in':'s-out');
  circle.textContent = '✓';
  document.getElementById('s-id').textContent = id;
  document.getElementById('s-type').textContent = type==='IN' ? 'CLOCKED IN' : 'CLOCKED OUT';
  document.getElementById('s-time').textContent = timeStr;
  document.getElementById('s-dur').textContent = dur || '';

  show('screen-success');
  const bar=document.getElementById('prog');
  bar.style.transition='none'; bar.style.width='0%';
  requestAnimationFrame(()=>{ bar.style.transition='width 3s linear'; bar.style.width='100%'; });
  if(successTimer) clearTimeout(successTimer);
  successTimer=setTimeout(()=>show('screen-main'),3100);
}

// ── LOG ──
async function openLog() {
  show('screen-log');
  const tbody=document.getElementById('log-body');
  tbody.innerHTML='<tr><td colspan="5" style="color:var(--muted);padding:1rem 0;">Loading…</td></tr>';
  try {
    const r = await fetch(SCRIPT_URL+'?action=getRecent');
    const data = await r.json();
    tbody.innerHTML='';
    if(!data.records||data.records.length===0) {
      tbody.innerHTML='<tr><td colspan="5" style="color:var(--muted);padding:1rem 0;">No records yet.</td></tr>';
      return;
    }
    data.records.forEach(rec => {
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${rec.employeeId}</td><td>${rec.date}</td><td>${rec.clockIn||'—'}</td><td>${rec.clockOut||<span class="tag tag-out">open</span>}</td><td class="dur-cell">${rec.duration||''}</td>`;
      tbody.appendChild(tr);
    });
  } catch(e) {
    tbody.innerHTML='<tr><td colspan="5" style="color:var(--red);">Connection error.</td></tr>';
  }
}

// ── UTILS ──
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function post(payload) {
  const r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
  return r.json();
}
</script>
</body>
</html>
